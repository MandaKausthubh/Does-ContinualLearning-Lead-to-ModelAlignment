# Model Configuration

# Base model settings
base_model:
  name: "meta-llama/Llama-3.2-1B"  # Options: Llama-3.2-1B, Llama-3.2-3B, Llama-3.2-8B
  cache_dir: "./cache/models"
  torch_dtype: "bfloat16"

# PEFT/LoRA settings
lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# Generation settings
generation:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  do_sample: true
  num_beams: 1
  early_stopping: false
  pad_token_id: null  # Will be set from tokenizer